name: Update market data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-market-data.yml'
      - '.github/scripts/fetch_market_data.py'
      - 'index.html'

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch market snapshot
        run: python .github/scripts/fetch_market_data.py

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update market data snapshot"
            git push
          fi
