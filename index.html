<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi primera app</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #1e3a5f 100%);
      color: #f8fafc;
      padding: 1.5rem;
      text-align: center;
    }

    main {
      max-width: 22rem;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
    }

    p {
      color: #cbd5e1;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      background: #38bdf8;
      color: #0f172a;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.97);
    }

    #contador {
      margin-top: 1.25rem;
      font-size: 2rem;
      font-weight: 700;
      color: #38bdf8;
    }
  </style>
</head>
<body>
  <main>
    <h1>¡Hola desde GitHub Pages!</h1>
    <p>Tu app ya está en internet. Ábrela en Safari desde tu iPhone.</p>
    <button id="btn" type="button">Toca aquí</button>
    <div id="contador">0</div>
  </main>

  <script>
    let n = 0;
    const btn = document.getElementById('btn');
    const contador = document.getElementById('contador');

    btn.addEventListener('click', () => {
      n += 1;
      contador.textContent = n;
    });
  </script>
</body>
</html>
